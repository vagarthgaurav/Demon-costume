name: iOS Build (unsigned)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15
    defaults:
      run:
        working-directory: Software/demonApp
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - name: Scaffold iOS platform files if missing
        run: |
          if [ ! -d ios ]; then
            flutter create . --platforms=ios --org com.demoncostume --project-name demon_app
          fi

      - name: Set Bluetooth usage description
        run: |
          /usr/libexec/PlistBuddy -c "Add :NSBluetoothAlwaysUsageDescription string 'Demon Costume uses Bluetooth to connect to and control your costume's LED board.'" ios/Runner/Info.plist

      - run: flutter build ios --release --no-codesign

      - name: Package unsigned IPA
        run: |
          mkdir -p Payload
          cp -r build/ios/iphoneos/Runner.app Payload/
          zip -r demon_app.ipa Payload

      - uses: actions/upload-artifact@v4
        with:
          name: demon-app-ipa
          path: Software/demonApp/demon_app.ipa
